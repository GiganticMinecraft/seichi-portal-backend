services:
  db:
    image: mariadb:lts
    container_name: mariadb
    command: --log-bin --binlog-format=ROW --binlog_row_image=FULL
    environment:
      - MYSQL_INITDB_SKIP_TZINFO=1
      - MARIADB_DATABASE=seichi_portal
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_USER=user
      - MARIADB_PASSWORD=password
      - MYSQL_TCP_PORT=3306
    ports:
      - "3306:3306"
    networks:
      - seichi_portal
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/create-debezium-user.sql:/docker-entrypoint-initdb.d/create-debezium-user.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "-proot", "--silent"]
      interval: 5s
      timeout: 30s
      retries: 10
    restart: always
  valkey:
    image: valkey/valkey:9-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    networks:
      - seichi_portal
    restart: always
  valkey-seed:
    image: valkey/valkey:9-alpine
    container_name: valkey-seed
    depends_on:
      - valkey
    volumes:
      - ./docker/valkey/seed.sh:/seed.sh
    entrypoint: ["sh", "/seed.sh"]
    networks:
      - seichi_portal
    restart: "no"
  # The backend still runs embedded migrations on startup, but development
  # compose runs them here first so db-seed can rely on the schema existing.
  migrate:
    image: rust:1.95.0
    container_name: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MYSQL_DATABASE=seichi_portal
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    working_dir: /work/server
    volumes:
      - .:/work
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target:/work/server/target
      - ./docker/migrate.sh:/migrate.sh
    entrypoint: ["sh", "/migrate.sh"]
    networks:
      - seichi_portal
    restart: "no"
  db-seed:
    image: mariadb:lts
    container_name: db-seed
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./docker/seed-debug-users.sh:/seed-debug-users.sh
      - ./docker/seed-debug-users.sql:/seed-debug-users.sql
    entrypoint: ["sh", "/seed-debug-users.sh"]
    networks:
      - seichi_portal
    restart: "no"
  meilisearch:
    # NOTE: meilisearch の公式 Docker イメージをそのまま使用すると、全文検索時に日本語の漢字と中国語の漢字が衝突するために検索できない場合があるため、
    # 中国語のトークン化が無効化された日本語用の Docker イメージを使用する
    # ref: https://github.com/meilisearch/meilisearch/pull/3882
    image: getmeili/meilisearch:prototype-japanese-13
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
    networks:
      - seichi_portal
    volumes:
      - meili_data:/data.ms
    restart: always
  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: rabbitmq
    environment:
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    volumes:
      - ./docker/rabbitmq_definitions.json:/etc/rabbitmq/definitions.json
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 5s
      timeout: 30s
      retries: 3
    networks:
      - seichi_portal
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
  debezium:
    image: quay.io/debezium/server:3.6
    ports:
      - "8080:8080"
    volumes:
      - ./docker/debezium_conf:/debezium/config
    networks:
      - seichi_portal
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: always
networks:
  seichi_portal:
    name: seichi_portal
    external: false
volumes:
  mysql_data:
  meili_data:
  cargo_registry:
  cargo_git:
  cargo_target:
