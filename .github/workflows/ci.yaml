name: Checking
on:
  push:

env:
  image_name: ghcr.io/giganticminecraft/seichi-poral-backend
  RUST_BACKTRACE: full

permissions:
  checks: write

jobs:
  rustfmt:
    name: rustfmt check
    runs-on: ubuntu-latest
    env:
      RUST_VERSION: "$(grep -oP '(?<=channel = \").*(?=\")' rust-toolchain.toml)"
    steps:
      - name: Checkout
        uses: actions/checkout@master
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: ${{ matrix.cross-target }}
          components: rustfmt
      - name: Rustfmt check
        run: cargo fmt --all -- --check

  lint-and-test:
    needs: [ rustfmt ]
    name: Lint and test server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: echo "RUST_VERSION=$(sed -n 's/channel = "\(.*\)\"/\1/p' rust-toolchain.toml)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        with:
          key: rust-${{ env.RUST_VERSION }}-build-${{ hashFiles('**/Cargo.toml') }}
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cache/sccache/
            target/
          restore-keys: |
            rust-${{ env.RUST_VERSION }}-build-
            rust-${{ env.RUST_VERSION }}-
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
      - uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"
      - run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - name: Configure Cache Env
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cargo build
        run: cargo build

      - name: Check OpenAPI document
        run: |
          cargo run --package entrypoint --bin generate-openapi
          git ls-files --error-unmatch docs/openapi.json
          git diff --exit-code -- docs/openapi.json

      - uses: LoliGothick/clippy-check@v0.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deny: warnings
          working-directory: .

      - name: Cargo test
        run: cargo test --all-features

  sqlx-prepare-check:
    needs: [ rustfmt ]
    name: sqlx prepare check
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:lts
        env:
          MYSQL_INITDB_SKIP_TZINFO: 1
          MARIADB_DATABASE: seichi_portal
          MARIADB_ROOT_PASSWORD: root
          MARIADB_USER: user
          MARIADB_PASSWORD: password
          MYSQL_TCP_PORT: 3306
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      DATABASE_URL: mysql://user:password@127.0.0.1:3306/seichi_portal
    steps:
      - uses: actions/checkout@v6
      - run: echo "RUST_VERSION=$(sed -n 's/channel = \"\(.*\)\"/\1/p' rust-toolchain.toml)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        with:
          key: rust-${{ env.RUST_VERSION }}-build-${{ hashFiles('**/Cargo.toml') }}
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cache/sccache/
            target/
          restore-keys: |
            rust-${{ env.RUST_VERSION }}-build-
            rust-${{ env.RUST_VERSION }}-
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install sqlx CLI
        run: cargo install sqlx-cli --version 0.8.6 --locked --no-default-features --features rustls,mysql
      - name: Apply migrations
        run: cargo sqlx migrate run --source ./server/migration/migrations
      - name: Check sqlx offline metadata
        run: cargo sqlx prepare --check --workspace
