name: Build docker images

on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    name: Build for ${{ matrix.docker-platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker-platform: linux/amd64
            cross-target: x86_64-unknown-linux-gnu
          - docker-platform: linux/arm64/v8
            cross-target: aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master
      - run: echo "RUST_VERSION=$(sed -n 's/channel = "\(.*\)"/\1/p' rust-toolchain.toml)" >> $GITHUB_ENV
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: ${{ matrix.cross-target }}
      - name: Build binary using cross
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: build
          args: --manifest-path Cargo.toml --target ${{ matrix.cross-target }} --release
      - name: Upload artifact to collect in next job
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.cross-target }}
          path: target/${{ matrix.cross-target }}/release/entrypoint

  build-docker:
    name: Build docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - parallel:
          - name: Checkout
            uses: actions/checkout@master
          - name: Set up QEMU
            uses: docker/setup-qemu-action@v4
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4

      - parallel:
          - uses: actions/download-artifact@v8
            with:
              name: x86_64-unknown-linux-gnu
              path: docker/artifacts/x86_64-unknown-linux-gnu
          - uses: actions/download-artifact@v8
            with:
              name: aarch64-unknown-linux-gnu
              path: docker/artifacts/aarch64-unknown-linux-gnu

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: docker
          platforms: linux/amd64,linux/arm64/v8
          push: false
